<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计灵感剪切板 - Step 1: 周视图布局</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-amber: #d4a574;
            --light-amber: #e8c4a0;
            --dark-amber: #8b6f47;
            --bg-light: #faf8f3;
            --bg-dark: #2d2520;
            --text-dark: #3a2f2a;
            --text-light: #f5f1e8;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* 深色模式 */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: var(--bg-dark);
                color: var(--text-light);
            }

            .header,
            .notes-area {
                background-color: rgba(45, 37, 32, 0.8);
                color: var(--text-light);
            }

            .day-card {
                background-color: rgba(60, 50, 45, 0.8);
                border-color: var(--primary-amber);
            }
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', cursive, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 20px;
            min-height: 100vh;
        }

        /* ════════════════════════════════════════ */
        /* 主容器 */
        /* ════════════════════════════════════════ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ════════════════════════════════════════ */
        /* 顶部导航 */
        /* ════════════════════════════════════════ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .week-info {
            text-align: center;
            flex: 1;
        }

        .week-info h1 {
            font-size: 28px;
            font-weight: 400;
            color: var(--dark-amber);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .week-info p {
            font-size: 14px;
            color: #999;
            font-weight: 300;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background-color: var(--primary-amber);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .nav-btn:hover {
            background-color: var(--dark-amber);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        /* ════════════════════════════════════════ */
        /* Grid 布局系统 */
        /* ════════════════════════════════════════ */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        /* 所有日期卡片均占1列 */
        .week-grid .day-card {
            grid-column: span 1;
        }

        /* ════════════════════════════════════════ */
        /* 日期卡片样式 */
        /* ════════════════════════════════════════ */
        .day-card {
            background-color: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            min-height: 300px;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .day-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-dark);
            border-color: var(--primary-amber);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--light-amber);
        }

        .day-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-amber);
            letter-spacing: 1px;
        }

        .day-date {
            font-size: 12px;
            color: #999;
            font-weight: 300;
        }

        /* 卡片内容占位 */
        .day-content {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 14px;
            text-align: center;
            font-style: italic;
        }

        /* ════════════════════════════════════════ */
        /* 笔记区 */
        /* ════════════════════════════════════════ */
        .notes-section {
            margin-top: 40px;
        }

        .notes-section h2 {
            font-size: 20px;
            color: var(--dark-amber);
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .notes-area {
            background-color: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            min-height: 150px;
        }

        .notes-area:hover {
            border-color: var(--primary-amber);
        }

        .notes-area textarea {
            width: 100%;
            height: 200px;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Georgia', cursive, sans-serif;
            font-size: 14px;
            resize: vertical;
            background-color: #fafaf8;
            color: var(--text-dark);
            outline: none;
            transition: background-color 0.3s ease;
        }

        .notes-area textarea:focus {
            background-color: #fff;
            box-shadow: inset 0 0 8px rgba(212, 165, 116, 0.2);
        }

        /* ════════════════════════════════════════ */
        /* 响应式设计 */
        /* ════════════════════════════════════════ */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 12px;
            }

            .nav-buttons {
                width: 100%;
                justify-content: center;
            }

            .week-grid {
                grid-template-columns: 1fr;
            }

            .week-grid .day-card:nth-child(n+4) {
                grid-column: span 1;
            }

            .week-grid .day-card:last-of-type {
                grid-column: span 1;
            }

            .day-card {
                min-height: 250px;
            }

            .week-info h1 {
                font-size: 22px;
            }
        }

        /* ════════════════════════════════════════ */
        /* 装饰元素 (准备给Step 2使用) */
        /* ════════════════════════════════════════ */
        .decorator {
            position: absolute;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" id="prevWeekBtn">← 上一周</button>
            </div>
            <div class="week-info">
                <h1 id="weekTitle">Week 16</h1>
                <p id="weekRange">2026.04.13 - 2026.04.19</p>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="nextWeekBtn">下一周 →</button>
            </div>
        </div>

        <!-- 周视图网格 -->
        <div class="week-grid">
            <!-- 第1行：周一 / 周二 / 周三 -->
            <div class="day-card">
                <div class="day-header">
                    <span class="day-name">Monday</span>
                    <span class="day-date" id="date-1">04.14</span>
                </div>
                <div class="day-content">← 点击或粘贴图片</div>
            </div>

            <div class="day-card">
                <div class="day-header">
                    <span class="day-name">Tuesday</span>
                    <span class="day-date" id="date-2">04.15</span>
                </div>
                <div class="day-content">← 点击或粘贴图片</div>
            </div>

            <div class="day-card">
                <div class="day-header">
                    <span class="day-name">Wednesday</span>
                    <span class="day-date" id="date-3">04.16</span>
                </div>
                <div class="day-content">← 点击或粘贴图片</div>
            </div>

            <!-- 第2行：周四 / 周五 / 周末 -->
            <div class="day-card">
                <div class="day-header">
                    <span class="day-name">Thursday</span>
                    <span class="day-date" id="date-4">04.17</span>
                </div>
                <div class="day-content">← 点击或粘贴图片</div>
            </div>

            <div class="day-card">
                <div class="day-header">
                    <span class="day-name">Friday</span>
                    <span class="day-date" id="date-5">04.18</span>
                </div>
                <div class="day-content">← 点击或粘贴图片</div>
            </div>

            <div class="day-card">
                <div class="day-header">
                    <span class="day-name">Weekend</span>
                    <span class="day-date" id="date-6">04.19-20</span>
                </div>
                <div class="day-content">← 点击或粘贴图片</div>
            </div>
        </div>

        <!-- 笔记区 - 占满整行 -->
        <div class="notes-section">
            <h2>📝 周笔记</h2>
            <div class="notes-area">
                <textarea 
                    id="weekNotes" 
                    placeholder="记录本周的设计灵感、想法、改进..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // ════════════════════════════════════════
        // Step 1: 周视图逻辑（仅UI）
        // ════════════════════════════════════════

        class InspireweekManager {
            constructor() {
                this.currentDate = new Date(2026, 3, 16); // 当前周的某一天
                this.initEventListeners();
                this.updateWeekDisplay();
            }

            // 获取周一
            getMonday(date) {
                const d = new Date(date);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                return new Date(d.setDate(diff));
            }

            // 更新周视图显示
            updateWeekDisplay() {
                const monday = this.getMonday(this.currentDate);
                const weekNum = this.getWeekNumber(monday);

                // 更新标题
                document.getElementById('weekTitle').textContent = `Week ${weekNum}`;

                // 更新周期范围
                const sundayDate = new Date(monday);
                sundayDate.setDate(sundayDate.getDate() + 6);
                const startStr = this.formatDate(monday);
                const endStr = this.formatDate(sundayDate);
                document.getElementById('weekRange').textContent = `${startStr} - ${endStr}`;

                // 更新各日期
                for (let i = 0; i < 7; i++) {
                    const date = new Date(monday);
                    date.setDate(date.getDate() + i);
                    const dateElement = document.getElementById(`date-${i + 1}`);
                    if (dateElement) {
                        dateElement.textContent = this.formatDateShort(date);
                    }
                }
            }

            // 获取周数
            getWeekNumber(date) {
                const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                const dayNum = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            }

            // 格式化日期 (MM.DD - MM.DD)
            formatDate(date) {
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${date.getFullYear()}.${month}.${day}`;
            }

            // 格式化日期短格式 (MM.DD)
            formatDateShort(date) {
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${month}.${day}`;
            }

            // 上一周
            previousWeek() {
                this.currentDate.setDate(this.currentDate.getDate() - 7);
                this.updateWeekDisplay();
                console.log('切换到上一周');
            }

            // 下一周
            nextWeek() {
                this.currentDate.setDate(this.currentDate.getDate() + 7);
                this.updateWeekDisplay();
                console.log('切换到下一周');
            }

            // 初始化事件监听
            initEventListeners() {
                document.getElementById('prevWeekBtn').addEventListener('click', () => this.previousWeek());
                document.getElementById('nextWeekBtn').addEventListener('click', () => this.nextWeek());
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            new InspireweekManager();
        });
    </script>
</body>
</html>
